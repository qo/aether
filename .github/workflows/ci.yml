name: ci

on:
  push:
  pull_request:

jobs:
  protocol:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm test

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project in editable mode with dev extras
        run: python -m pip install -e ".[dev]"
      - name: Pytest
        run: python -m pytest -q

  web-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install web workspace
        run: npm install --workspace @aether/web
      - name: TypeScript check
        run: npx --no-install -w @aether/web tsc --noEmit
