services:
  api:
    image: python:3.12-slim
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: sh -lc "pip install -e '.[dev]' && uvicorn apps.api.src.main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8000:8000"
    environment:
      AETHER_DATA_DIR: /workspace/data

  web:
    image: node:22-alpine
    working_dir: /workspace
    volumes:
      - .:/workspace
    command: sh -lc "npm install && npm run web:dev -- --hostname 0.0.0.0"
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_AETHER_API: http://127.0.0.1:8000
      NEXT_PUBLIC_AETHER_WS: ws://127.0.0.1:8000/ws/live
